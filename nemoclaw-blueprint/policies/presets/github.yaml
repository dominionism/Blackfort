preset:
  name: github
  description: "GitHub repo push and REST API access for git/curl only"

network_policies:
  github_web:
    name: github_web
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
          - allow: { method: PATCH, path: "/**" }
          - allow: { method: PUT, path: "/**" }
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/bin/curl }
      - { path: /usr/lib/git-core/git-remote-http }
      - { path: /usr/lib/git-core/git-remote-https }
      - { path: /usr/lib/git-core/git-http-fetch }
      - { path: /usr/lib/git-core/git-http-push }
